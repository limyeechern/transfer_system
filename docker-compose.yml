services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://transfer_system:transfer_system@postgres:5432/transfer_system?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transfer_system
      POSTGRES_USER: transfer_system
      POSTGRES_PASSWORD: transfer_system
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfer_system -d transfer_system"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
